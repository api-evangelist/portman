apis:
  - aid: portman:portman
    name: Portman
    description: >-
      Portman is an open source CLI tool that auto-generates Postman
      collections with contract and variation tests from OpenAPI
      specifications. It converts static OpenAPI specs into dynamic, testable
      Postman collections, automatically generating contract tests, variation
      tests, integration tests, and fuzzing tests for use with Newman or the
      Postman platform.
