aid: portman
name: Portman
description: >-
  Portman is an open source CLI tool that auto-generates Postman collections
  with contract and variation tests from OpenAPI specifications, supporting
  OpenAPI 3.0 and 3.1, fuzzing, request customization, pre-request scripts,
  and direct upload to Postman or execution via Newman in CI/CD pipelines.
